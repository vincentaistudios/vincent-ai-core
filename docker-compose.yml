services:
  vincent-bot:
    build: .
    container_name: vincent-ai-core
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./banco_de_dados:/app/banco_de_dados
      - ./recursos:/app/recursos
    ports:
      - "3099:3099" # Porta para o Dashboard de consumo Groq
    environment:
      - TERM=xterm-256color
      - TZ=America/Sao_Paulo
    stop_grace_period: 30s
